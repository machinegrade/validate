name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # NOTE: no `cache: npm` here — this repo doesn't ship a
          # package-lock.json yet (generate one with `npm install` and
          # commit it, then this step can add `cache: npm` +
          # `cache-dependency-path: package-lock.json`).
      - name: Install dependencies
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test

  # Deploy is intentionally disabled until phase P2: it needs the owner's
  # Cloudflare account and the following repo/environment secrets to be
  # configured before this job can run:
  #   CLOUDFLARE_API_TOKEN  - wrangler deploy auth
  #   CLOUDFLARE_ACCOUNT_ID - target Cloudflare account
  #   ADMIN_TOKEN           - set as a Worker secret via `wrangler secret put`
  #                           (not a GitHub secret consumed here directly)
  # Once those exist, uncomment this job and set it to run on pushes to main.
  #
  # deploy:
  #   needs: test
  #   runs-on: ubuntu-latest
  #   if: github.ref == 'refs/heads/main'
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: "20"
  #     - run: npm install
  #     - uses: cloudflare/wrangler-action@v3
  #       with:
  #         apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  #         accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  #         command: deploy
