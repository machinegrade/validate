name: Publish to MCP Registry

# Manual trigger only (see below) — device-flow login (`mcp-publisher login
# github`) can't grant the io.github.machinegrade/* namespace: the registry's
# GitHub App ("MCP Registry Login (Prod)") is private, so it can't be
# installed on any org outside its own. OIDC sidesteps that entirely — the
# registry derives publish permission for io.github.<owner>/* straight from
# the workflow's repository_owner claim, no app installation needed.
on:
  workflow_dispatch:

permissions:
  id-token: write # required for GitHub OIDC token exchange
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc
      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
